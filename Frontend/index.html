<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>SeggiWeather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="search-section">
            <input id="input" type="text" placeholder="Enter city">
            <button onclick="getLocationWeatherData()">show</button>
        </div>

        <h1 id="error" style="display: none;">No city found</h1>

        <div id="weatherBox" style="display: none;">
            <div class="weather-section">
                <h2>Current Weather</h2>
                <div id="currentTemp"></div>
                <div id="conditionIcon"></div>
            </div>

            <div class="weather-section">
                <h2>Forecast</h2>
                <div class="forecast-grid">
                    <div id="day1"></div>
                    <div id="day2"></div>
                    <div id="day3"></div>
                    <div id="day4"></div>
                    <div id="day5"></div>
                    <div id="day6"></div>
                </div>
            </div>

            <div class="weather-section">
                <h2>Details</h2>
                <div class="details-grid">
                    <div id="humidity"></div>
                    <div id="windSpeed"></div>
                    <div id="condition"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
